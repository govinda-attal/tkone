[databases]
tempo = host=postgres port=5432 dbname=tempo

[pgbouncer]
listen_addr          = 0.0.0.0
listen_port          = 5432
auth_type            = scram-sha-256
auth_file            = /etc/pgbouncer/userlist.txt

; Transaction mode — required for SKIP LOCKED and FOR UPDATE patterns
pool_mode            = transaction
max_client_conn      = 200
default_pool_size    = 10
reserve_pool_size    = 3
reserve_pool_timeout = 5

server_idle_timeout  = 60
client_idle_timeout  = 0
server_reset_query   = DISCARD ALL

; Keep connections alive through idle periods
tcp_keepalive        = 1
tcp_keepidle         = 30
tcp_keepintvl        = 10

log_connections      = 0
log_disconnections   = 0
log_pooler_errors    = 1

; Admin access on port 6432
admin_users          = tempo
stats_users          = tempo
